<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurd Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">KD</div>
        <div>
          <h1>Kurd Designer</h1>
          <p>ئامرازێکی وێنەکاری و دیزاین بە زمانی کوردی</p>
        </div>
      </div>

      <div class="header-actions">
        <button class="icon-btn" id="undoBtn">↩️</button>
        <button class="icon-btn" id="redoBtn">↪️</button>
        <button class="icon-btn" id="downloadPng">PNG</button>
        <button class="icon-btn" id="downloadJpg">JPG</button>
      </div>
    </header>

    <main class="app-body">
      <section class="canvas-wrap">
        <div class="canvas-topbar">
          <div class="zoom-box">
            <button class="zoom-btn" data-zoom="out">−</button>
            <span id="zoomLabel">100%</span>
            <button class="zoom-btn" data-zoom="in">+</button>
          </div>

          <div class="status-box">
            <span>ئامراز: <strong id="activeToolLabel">پەڕە</strong></span>
            <span>قۆناغ: <strong id="historyCount">1</strong></span>
          </div>
        </div>

        <div class="canvas-stage" id="stage">
          <canvas id="editorCanvas" width="1400" height="900"></canvas>
          <div id="textHint" class="text-hint hidden">لە شوێنێک لمس یان کلیک بکە بۆ نووسین</div>
        </div>
      </section>

      <aside class="control-panel">
        <section class="panel">
          <h2>کۆنترۆڵ</h2>

          <label>
            ڕەنگ
            <input type="color" id="colorPicker" value="#7c3aed" />
          </label>

          <label>
            ئەستووری
            <input type="range" id="brushSize" min="1" max="80" value="8" />
          </label>

          <label>
            ڕووناکی
            <input type="range" id="brightness" min="50" max="150" value="100" />
          </label>

          <label>
            کۆنتراست
            <input type="range" id="contrast" min="50" max="150" value="100" />
          </label>

          <label>
            تەم
            <input type="range" id="blur" min="0" max="8" value="0" />
          </label>
        </section>

        <section class="panel">
          <h2>فلتەرەکان</h2>
          <div class="filter-list">
            <button class="secondary-btn filter-btn" data-filter="none">ئاسایی</button>
            <button class="secondary-btn filter-btn" data-filter="grayscale(1)">ڕەش و سپی</button>
            <button class="secondary-btn filter-btn" data-filter="sepia(1)">سێپیا</button>
            <button class="secondary-btn filter-btn" data-filter="invert(1)">پێچەوانە</button>
          </div>
        </section>

        <section class="panel">
          <h2>پرۆژە</h2>
          <div class="stack">
            <button class="secondary-btn" id="newProject">پرۆژەی نوێ</button>

            <label class="secondary-btn upload-like">
              📂 بارکردنی وێنە
              <input type="file" id="imageLoader" accept="image/*" hidden />
            </label>

            <button class="secondary-btn" id="saveProject">💾 پاشەکەوتی پرۆژە</button>

            <label class="secondary-btn upload-like">
              ♻️ کردنەوەی پرۆژە
              <input type="file" id="projectLoader" accept=".json" hidden />
            </label>

            <button class="danger-btn" id="clearCanvas">🗑️ پاککردنەوە</button>
          </div>
        </section>
      </aside>
    </main>

    <nav class="bottom-tools">
      <button class="tool-btn active" data-tool="brush">
        <span class="tool-icon">✏️</span>
        <span>پەڕە</span>
      </button>
      <button class="tool-btn" data-tool="eraser">
        <span class="tool-icon">🧽</span>
        <span>سڕینەوە</span>
      </button>
      <button class="tool-btn" data-tool="line">
        <span class="tool-icon">📏</span>
        <span>هێڵ</span>
      </button>
      <button class="tool-btn" data-tool="rect">
        <span class="tool-icon">▭</span>
        <span>چوارگۆشە</span>
      </button>
      <button class="tool-btn" data-tool="circle">
        <span class="tool-icon">⚪</span>
        <span>بازنە</span>
      </button>
      <button class="tool-btn" data-tool="text">
        <span class="tool-icon">🔤</span>
        <span>نووسین</span>
      </button>
      <button class="tool-btn" data-tool="pan">
        <span class="tool-icon">✋</span>
        <span>گواستنەوە</span>
      </button>
    </nav>
  </div>

  <script src="./script.js"></script>
</body>
</html>
